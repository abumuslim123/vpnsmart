services:
  xray:
    image: ghcr.io/xtls/xray-core:latest
    container_name: vpnsmart-xray-russia
    command: ['run', '-c', '/etc/xray/config.json']
    network_mode: host
    user: "0:0"
    cap_add:
      - NET_ADMIN
      - NET_BIND_SERVICE
    volumes:
      - ./xray/config.json:/etc/xray/config.json:ro
      - ./xray/geodata:/usr/share/xray:ro
    environment:
      - XRAY_LOCATION_ASSET=/usr/share/xray
    restart: unless-stopped

  bot:
    build: ./bot
    container_name: vpnsmart-bot
    env_file: .env.bot
    ports:
      - "8080:8080"
    volumes:
      - ./xray/config.json:/opt/vpnsmart/xray/config.json
      - bot-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - xray
    restart: unless-stopped

volumes:
  bot-data:
