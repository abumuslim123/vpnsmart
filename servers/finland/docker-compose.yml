services:
  wireguard:
    image: lscr.io/linuxserver/wireguard:latest
    container_name: vpnsmart-wg-finland
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - PUID=1000
      - PGID=1000
      - TZ=Europe/Helsinki
    volumes:
      - ./wireguard/wg0.conf:/config/wg_confs/wg0.conf
    ports:
      - "51820:51820/udp"
    sysctls:
      - net.ipv4.ip_forward=1
      - net.ipv6.conf.all.forwarding=1
      - net.ipv4.conf.all.src_valid_mark=1
    restart: unless-stopped
